name: python-reusable-ci

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        required: false
        type: string
        default: "3.11"
      install-command:
        description: Dependency install command
        required: false
        type: string
        default: "pip install -r requirements.txt"
      test-command:
        description: Test command to execute
        required: false
        type: string
        default: "pytest -q"
      working-directory:
        description: Directory where commands run
        required: false
        type: string
        default: "."

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Run lint (if available)
        run: |
          if command -v ruff >/dev/null 2>&1; then
            ruff check .
